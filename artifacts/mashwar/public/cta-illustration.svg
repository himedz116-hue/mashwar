<svg width="580" height="400" viewBox="0 0 580 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Decorative background circles -->
  <circle cx="490" cy="80" r="120" fill="white" fill-opacity="0.04"/>
  <circle cx="490" cy="80" r="80" fill="white" fill-opacity="0.05"/>
  <circle cx="100" cy="320" r="90" fill="white" fill-opacity="0.04"/>

  <!-- Dashed route line -->
  <path d="M 80 310 Q 200 240 290 200 Q 380 160 460 110" stroke="white" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="8 6" fill="none"/>

  <!-- Location pin - start -->
  <g transform="translate(68, 295)">
    <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.15"/>
    <circle cx="12" cy="10" r="6" fill="white" fill-opacity="0.9"/>
    <path d="M12 16 L12 22" stroke="white" stroke-opacity="0.9" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Location pin - end -->
  <g transform="translate(448, 95)">
    <circle cx="12" cy="12" r="12" fill="#D4EDA8" fill-opacity="0.25"/>
    <circle cx="12" cy="10" r="6" fill="#D4EDA8"/>
    <path d="M12 16 L12 22" stroke="#D4EDA8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ===== TRUCK ===== -->
  <g transform="translate(30, 230)">
    <!-- Truck body -->
    <rect x="20" y="20" width="100" height="65" rx="8" fill="white" fill-opacity="0.92"/>
    <!-- Cargo box -->
    <rect x="2" y="30" width="20" height="55" rx="5" fill="white" fill-opacity="0.7"/>
    <!-- Cab window -->
    <rect x="28" y="28" width="38" height="25" rx="4" fill="#679632" fill-opacity="0.5"/>
    <!-- Cab stripes -->
    <line x1="50" y1="28" x2="50" y2="53" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
    <!-- Door line -->
    <line x1="68" y1="28" x2="68" y2="85" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- Wheels -->
    <circle cx="35" cy="89" r="13" fill="#3a5c20" stroke="white" stroke-opacity="0.6" stroke-width="3"/>
    <circle cx="35" cy="89" r="5" fill="white" fill-opacity="0.5"/>
    <circle cx="98" cy="89" r="13" fill="#3a5c20" stroke="white" stroke-opacity="0.6" stroke-width="3"/>
    <circle cx="98" cy="89" r="5" fill="white" fill-opacity="0.5"/>
    <!-- Front bumper -->
    <rect x="117" y="68" width="6" height="20" rx="3" fill="white" fill-opacity="0.5"/>
    <!-- Headlight -->
    <rect x="113" y="42" width="10" height="6" rx="3" fill="#D4EDA8" fill-opacity="0.9"/>
    <!-- Meshwar logo on cargo -->
    <text x="6" y="62" font-family="Arial" font-size="5" fill="white" fill-opacity="0.7" font-weight="bold">MESHWAR</text>
    <!-- Speed lines -->
    <line x1="-15" y1="55" x2="0" y2="55" stroke="white" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"/>
    <line x1="-22" y1="65" x2="0" y2="65" stroke="white" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="75" x2="0" y2="75" stroke="white" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ===== PHONE MOCKUP ===== -->
  <g transform="translate(210, 25)">
    <!-- Phone shadow -->
    <ellipse cx="90" cy="365" rx="70" ry="12" fill="black" fill-opacity="0.15"/>
    <!-- Phone frame -->
    <rect x="5" y="5" width="170" height="350" rx="28" fill="white" fill-opacity="0.15"/>
    <rect x="0" y="0" width="180" height="360" rx="30" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.5" stroke-width="2"/>
    <!-- Phone screen -->
    <rect x="8" y="8" width="164" height="344" rx="24" fill="#1a4010" fill-opacity="0.7"/>
    <!-- Notch -->
    <rect x="62" y="8" width="56" height="22" rx="11" fill="#1a4010"/>
    <circle cx="90" cy="19" r="4" fill="white" fill-opacity="0.2"/>

    <!-- STATUS BAR -->
    <text x="18" y="42" font-family="Arial" font-size="9" fill="white" fill-opacity="0.7">9:41</text>
    <g transform="translate(138, 34)">
      <rect x="0" y="0" width="6" height="8" rx="1" fill="white" fill-opacity="0.7"/>
      <rect x="8" y="2" width="6" height="6" rx="1" fill="white" fill-opacity="0.7"/>
      <rect x="16" y="4" width="6" height="4" rx="1" fill="white" fill-opacity="0.7"/>
    </g>

    <!-- APP HEADER -->
    <rect x="16" y="52" width="148" height="36" rx="10" fill="white" fill-opacity="0.08"/>
    <text x="90" y="74" font-family="Arial" font-size="11" fill="white" fill-opacity="0.9" text-anchor="middle" font-weight="bold">مشوار</text>

    <!-- GREETING -->
    <text x="158" y="108" font-family="Arial" font-size="9" fill="white" fill-opacity="0.6" text-anchor="end">مرحباً، عبدالعزيز 👋</text>

    <!-- MAP AREA -->
    <rect x="16" y="116" width="148" height="80" rx="12" fill="#2d6b1a" fill-opacity="0.6"/>
    <!-- Map grid lines -->
    <line x1="16" y1="136" x2="164" y2="136" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="16" y1="156" x2="164" y2="156" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="16" y1="176" x2="164" y2="176" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="50" y1="116" x2="50" y2="196" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="90" y1="116" x2="90" y2="196" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="130" y1="116" x2="130" y2="196" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <!-- Route on map -->
    <path d="M40 185 Q75 155 110 140 Q135 132 150 128" stroke="#D4EDA8" stroke-width="2.5" stroke-linecap="round" fill="none" stroke-dasharray="5 3"/>
    <!-- Pin A -->
    <circle cx="40" cy="185" r="6" fill="#D4EDA8"/>
    <circle cx="40" cy="185" r="3" fill="white"/>
    <!-- Pin B -->
    <circle cx="150" cy="128" r="7" fill="#99C169"/>
    <text x="150" y="131" font-family="Arial" font-size="7" fill="white" text-anchor="middle" font-weight="bold">B</text>
    <!-- Small truck on map -->
    <g transform="translate(85, 148)">
      <rect x="-8" y="-5" width="16" height="10" rx="3" fill="white"/>
      <rect x="-13" y="-3" width="6" height="6" rx="2" fill="white" fill-opacity="0.7"/>
      <circle cx="-5" cy="6" r="3" fill="#3a5c20" stroke="white" stroke-width="1"/>
      <circle cx="5" cy="6" r="3" fill="#3a5c20" stroke="white" stroke-width="1"/>
    </g>

    <!-- LABEL -->
    <text x="90" y="209" font-family="Arial" font-size="8.5" fill="white" fill-opacity="0.5" text-anchor="middle">اختر نوع المركبة</text>

    <!-- VEHICLE OPTIONS -->
    <!-- Wanette card -->
    <rect x="16" y="216" width="44" height="52" rx="10" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.25" stroke-width="1"/>
    <text x="38" y="232" font-family="Arial" font-size="14" text-anchor="middle">🚐</text>
    <text x="38" y="246" font-family="Arial" font-size="7" fill="white" fill-opacity="0.8" text-anchor="middle">وانيت</text>
    <text x="38" y="258" font-family="Arial" font-size="6" fill="#D4EDA8" text-anchor="middle">١ طن</text>

    <!-- Satha card (selected) -->
    <rect x="66" y="216" width="44" height="52" rx="10" fill="#D4EDA8" fill-opacity="0.2" stroke="#D4EDA8" stroke-opacity="0.7" stroke-width="1.5"/>
    <text x="88" y="232" font-family="Arial" font-size="14" text-anchor="middle">🚛</text>
    <text x="88" y="246" font-family="Arial" font-size="7" fill="white" text-anchor="middle" font-weight="bold">سطحة</text>
    <text x="88" y="258" font-family="Arial" font-size="6" fill="#D4EDA8" text-anchor="middle">٣ أطنان</text>
    <circle cx="88" cy="263" r="2.5" fill="#D4EDA8"/>

    <!-- Dina card -->
    <rect x="116" y="216" width="48" height="52" rx="10" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.25" stroke-width="1"/>
    <text x="140" y="232" font-family="Arial" font-size="14" text-anchor="middle">🚚</text>
    <text x="140" y="246" font-family="Arial" font-size="7" fill="white" fill-opacity="0.8" text-anchor="middle">دينا</text>
    <text x="140" y="258" font-family="Arial" font-size="6" fill="#D4EDA8" text-anchor="middle">٥ أطنان</text>

    <!-- PRICE ESTIMATE -->
    <rect x="16" y="276" width="148" height="34" rx="10" fill="white" fill-opacity="0.08"/>
    <text x="158" y="297" font-family="Arial" font-size="9" fill="white" fill-opacity="0.6" text-anchor="end">السعر التقديري</text>
    <text x="22" y="297" font-family="Arial" font-size="11" fill="#D4EDA8" font-weight="bold">٧٥ ر.س</text>

    <!-- CTA BUTTON -->
    <rect x="16" y="318" width="148" height="36" rx="12" fill="#D4EDA8" fill-opacity="0.95"/>
    <text x="90" y="340" font-family="Arial" font-size="10.5" fill="#3a5c20" text-anchor="middle" font-weight="bold">اطلب الآن</text>
  </g>

  <!-- Floating rating badge -->
  <g transform="translate(410, 155)">
    <rect x="0" y="0" width="115" height="48" rx="14" fill="white" fill-opacity="0.18" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
    <text x="57" y="18" font-family="Arial" font-size="8" fill="white" fill-opacity="0.7" text-anchor="middle">سائق موثق</text>
    <circle cx="20" cy="34" r="10" fill="white" fill-opacity="0.3"/>
    <text x="20" y="38" font-family="Arial" font-size="11" text-anchor="middle">👤</text>
    <text x="90" y="31" font-family="Arial" font-size="13" fill="#D4EDA8" text-anchor="middle" font-weight="bold">⭐ 4.9</text>
  </g>

  <!-- Floating ETA badge -->
  <g transform="translate(68, 170)">
    <rect x="0" y="0" width="110" height="44" rx="14" fill="white" fill-opacity="0.18" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
    <text x="55" y="16" font-family="Arial" font-size="8" fill="white" fill-opacity="0.7" text-anchor="middle">وقت الوصول</text>
    <text x="55" y="36" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">١٢ دقيقة</text>
  </g>

  <!-- Sparkles / dots decoration -->
  <circle cx="195" cy="60" r="4" fill="white" fill-opacity="0.4"/>
  <circle cx="500" cy="200" r="5" fill="#D4EDA8" fill-opacity="0.5"/>
  <circle cx="50" cy="150" r="3" fill="white" fill-opacity="0.3"/>
  <circle cx="420" cy="320" r="4" fill="white" fill-opacity="0.25"/>
  <circle cx="480" cy="340" r="3" fill="#D4EDA8" fill-opacity="0.4"/>

  <!-- Star sparkles -->
  <g transform="translate(180, 40)" opacity="0.5">
    <line x1="6" y1="0" x2="6" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="6" x2="12" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(510, 155)" opacity="0.4">
    <line x1="5" y1="0" x2="5" y2="10" stroke="#D4EDA8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="5" x2="10" y2="5" stroke="#D4EDA8" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(155, 340)" opacity="0.35">
    <line x1="5" y1="0" x2="5" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="5" x2="10" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

</svg>
