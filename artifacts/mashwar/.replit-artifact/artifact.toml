kind = "web"
previewPath = "/"
title = "مشوار - موقع تعريفي"
version = "1.0.0"
id = "artifacts/mashwar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24677

[services.development]
run = "pnpm --filter @workspace/mashwar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mashwar", "run", "build" ]
publicDir = "artifacts/mashwar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24677"
BASE_PATH = "/"
